<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Bank - Secure Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="loader-overlay" id="loader">
        <div class="spinner"></div>
    </div>

    <div class="auth-container">
        <!-- Login Card -->
        <div class="auth-card" id="login-card">
            <div class="auth-header">
                <h1>Lumina Bank</h1>
                <p>Digital Banking Redefined</p>
            </div>
            <div id="login-alert" class="alert"></div>
            <form id="login-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@email.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary">Login Securely</button>
            </form>
            <div style="text-align: center;">
                <button class="btn-link" onclick="toggleAuth('register')">Create an Account</button>
                <br>
                <button class="btn-link" onclick="toggleAuth('forgot')">Forgot Password?</button>
            </div>
        </div>

        <!-- Register Card -->
        <div class="auth-card" id="register-card" style="display: none;">
            <div class="auth-header">
                <h1>Join Lumina Bank</h1>
                <p>Start your financial journey</p>
            </div>
            <div id="register-alert" class="alert"></div>
            <form id="register-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="reg-name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="reg-phone" required>
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <textarea id="reg-address" required></textarea>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" required>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="reg-confirm" required>
                </div>
                <div class="form-group">
                    <label>Security Question</label>
                    <select id="reg-q" required>
                        <option value="">Select a question</option>
                        <option value="What is your pet's name?">What is your pet's name?</option>
                        <option value="What is your mother's maiden name?">What is your mother's maiden name?</option>
                        <option value="What was your first school?">What was your first school?</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Security Answer</label>
                    <input type="text" id="reg-a" required>
                </div>
                <button type="submit" class="btn btn-primary">Register Now</button>
            </form>
            <div style="text-align: center;">
                <button class="btn-link" onclick="toggleAuth('login')">Already have an account? Login</button>
            </div>
        </div>

        <!-- Forgot Password Card -->
        <div class="auth-card" id="forgot-card" style="display: none;">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Verify your identity</p>
            </div>
            <div id="forgot-alert" class="alert"></div>
            <form id="forgot-form">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="forgot-email" required>
                </div>
                <div class="form-group">
                    <label>Security Answer</label>
                    <input type="text" id="forgot-a" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="forgot-new-password" required>
                </div>
                <button type="submit" class="btn btn-primary">Reset Password</button>
            </form>
            <div style="text-align: center;">
                <button class="btn-link" onclick="toggleAuth('login')">Back to Login</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        function toggleAuth(type) {
            document.getElementById('login-card').style.display = type === 'login' ? 'block' : 'none';
            document.getElementById('register-card').style.display = type === 'register' ? 'block' : 'none';
            document.getElementById('forgot-card').style.display = type === 'forgot' ? 'block' : 'none';
        }
    </script>
</body>
</html>
